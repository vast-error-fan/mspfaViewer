    <h1 class="page-title">엘시<span class="colon">:</span> 벽의 구멍을 살펴본다.</h1>

<img src="../assets/panels/act2/00352.gif"

<div class="story">

<p>도개체 무슨 일을 벌였는지, 너는 전혀 짐작할 수 없다. 단순히 침입해서 물건을 훔치려는 자라면 여기까지 난장판을 만들지는 않을 거다! 
그런 건 원래 몰래 하는 거니까, 너는 생각한다.</p>

<p>망가진 하이브는 물론이고, 기둥들과... 그 밖의 모든 것에 대해서도 딱 떨어지는 설명은 보이지 않는다.</p>

<p>목격자라도 찾아보는 게 좋을지도 모른다.</p>

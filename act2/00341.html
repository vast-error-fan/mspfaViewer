<p>이럴 수가, 오늘 밤은 정말 놀라운 일투성이네.</p>

<p>네 스코르페 테마의 이름은 "형성의 기초"다. 이 테마를 쓰면 대화 기록에 좀 더 빠르고, 원형으로 이어지는 방식으로 접근할 수 있다. 
디자인은 과거에 숨겨진 마법적 영향력에 관한 전설을 바탕으로 만들어졌고 그 전설은, 수많은 부정론자들의 말과는 달리, 네가 알기로 아주 확실한 사실이다.</p>

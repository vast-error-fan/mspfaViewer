<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        /* 원작 홈페이지 특유의 어두운 회색 배경과 정렬 설정 */
        body { 
            background-color: #222222; 
            color: #ffffff;
            font-family: "Courier New", Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 40px 0;
        }
        /* 대문 포스터 이미지 스타일 설정 */
        .poster-img {
            max-width: 650px;
            width: 100%;
            height: auto;
            border: 2px solid #444444;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        /* 만화 시작하기 텍스트 링크 스타일 */

            display: inline-block;
            margin-top: 25px;

            text-decoration: none;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
        .start-link:hover {
            color: #ffffff;
            text-shadow: 0 0 15px #ffffff;
        }
        /* 하단 서브 메뉴 링크 디자인 */
        .footer-menu {
            margin-top: 35px;
            font-size: 14px;
            color: #aaaaaa;
        }
        .footer-menu a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 5px;
        }
        .footer-menu a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- 1. 포스터 이미지를 누르면 바로 만화 본문(mspfa)으로 이동합니다 -->

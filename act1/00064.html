    <h1 class="page-title">타즈<span class="colon">:</span> 바를 살펴본다.</h1>

<img src="../assets/panels/act1/00064.gif"

<div class="story">

<p>
카운터 위에는 아직 개봉하지 않은 핀폴 퓨얼 두 병과
암브로시아 고기 덩어리 하나가 놓여 있다.
당신이 가장 좋아하는 방식으로 조리된 상태다.
즉, 날것 그대로.
</p>

<p>
하지만 지금은 느긋하게 식사를 즐길 때가 아니다.
당신에게는 약속이 있다.
그 약속이란,
시끄럽게 방송을 타고 있는 짜증 나는 내부 이단 사상을 향해
정신적인 스맥다운을 날려 주는 것이다.
</p>

<p>
당신의 루서스는 두 사람의 관계를 완전히 거꾸로 이해하고 있다.
</p>

<p>
그녀는 스스로를 당신의 하이브의 반(半)수생 여왕이라고 생각한다.
당신의 여왕이자, 내친김에 행성 전체의 여왕이라고도 생각한다.
모든 것은 그녀의 소유물이다.
심지어 당신이 다음번 의무적인 희생 제물이 필요해질 때를 대비해
요새에 따로 보관해 두었던 다음 경기 상대까지도.
</p>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vast Error 비공식 번역</title>
    <style>
        body {
        background-color: #1a1a1a;
        background-image: url("tv-noise-static.png"); /* 흑백 노이즈 정지 이미지 */
        background-size: 150px 150px;
        background-repeat: repeat;
        color: #ffffff;
        font-family: "Courier New", Courier, monospace;
        margin: 0;
        padding: 40px 0;
        
        /* 수정: 브라우저 기본 블록 정렬을 사용해 순서 꼬임 원천 차단 */
        display: block;
        text-align: center;
    }

    /* 대문 포스터 이미지 스타일 설정 */
    .poster-img {
        max-width: 650px;
        width: 100%;
        height: auto;
        border: 2px solid #444444;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        cursor: pointer;
        
        /* 추가: 이미지를 가운데로 보내고 아래 배치들과 간격 주기 */
        display: block;
        margin: 0 auto 25px auto;
    }

    /* 만화 시작하기 텍스트 링크 스타일 */
    .start-link {
        display: inline-block;
        font-size: 24px;
        font-weight: bold;
        color: #00ff00; /* 홈스턱 감성의 녹색 조광 효과 */
        text-decoration: none;
        text-shadow: 0 0 10px rgba(0,255,0,0.5);
        
        /* 추가: 위치 고정 */
        margin: 0 auto 35px auto;
        width: 100%;
    }
    .start-link:hover {
        color: #ffffff;
        text-shadow: 0 0 15px #ffffff;
    }

    /* 하단 서브 메뉴 링크 디자인 */
    .footer-menu {
    font-size: 14px;
    color: #aaaaaa;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px 16px;
    width: 100%;
    max-width: 900px; /* 💡 650에서 900으로 늘려 글자가 옆으로 쭉 펴지게 만듭니다 */
    margin: 0 auto;
    padding: 0 20px;
    box-sizing: border-box;
    }
        .footer-menu a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 5px;
        }
        .footer-menu a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- 1. 포스터 이미지를 누르면 바로 만화 본문(mspfa)으로 이동합니다 -->
    <a href="./mspfa/">
        <!-- 여기에 원작 대문 이미지 주소를 넣거나, 내 폴더에 이미지를 넣어 경로를 지정합니다 -->
        <img src="https://cdn.deconreconstruction.com/vasterror/panels/00001.gif" class="poster-img" alt="Vast Error">
    </a>

    <br>
    <!-- 2. 만화 읽기 시작 버튼 -->
    <a href="./mspfa/" class="start-link">> 만화 읽기 시작하기</a>

    <div class="footer-menu">

    </div>

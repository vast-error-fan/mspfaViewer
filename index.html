<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vast Error 비공식 번역</title>
    <style>
        body{

margin:0;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("./assets/bg.jpg");

background-size:cover;

background-position:center;

background-attachment:fixed;

color:#fff;

font-family:
"Courier New",
monospace;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

overflow-x:hidden;

padding:40px 0;

}

    /* 💡 원작 스타일: 전체를 감싸는 커다란 반투명 검은색 박스 */
    .main-wrapper{

background:

rgba(
0,
0,
0,
0.72
);

border:

1px solid #444;

padding:

18px;

width:760px;

box-sizing:border-box;

}

    .poster-img {
        max-width: 650px;
        width: 100%;
        height: auto;
        border: 2px solid #444444;
        display: block;
        margin: 0 auto 25px auto;
    }

    .start-link {
        display: inline-block;
        font-size: 24px;
        font-weight: bold;
        color: #00ff00;
        text-decoration: none;
        text-shadow: 0 0 10px rgba(0,255,0,0.5);
        margin: 25px auto;
        width: 100%;
        text-align: center;
    }
    .start-link:hover {
        color: #ffffff;
        text-shadow: 0 0 15px #ffffff;
    }

    .footer-menu{

background:

#eeeeee;

color:#000;

border:

1px solid #888;

padding:

10px;

margin:

12px 0;

text-align:center;

line-height:1.8;

}

.footer-menu a{

color:#000;

text-decoration:none;

}

.footer-menu a:hover{

text-decoration:underline;

}

    /* 💡 원작 스타일: 하단 버튼들을 감싸는 실선 회색 박스 */
    .gray-box {
        background-color: #2e2e2e; /* 어두운 회색 */
        border: 1px solid #555555; /* 얇은 회색 테두리 */
        padding: 12px;
        margin: 15px auto;
        max-width: 650px;
        width: 100%;
        color: #dddddd;
        font-size: 14px;
        text-align: center;
        box-sizing: border-box;
        cursor: pointer;
    }
    .gray-box:hover {
        background-color: #383838;
        color: #ffffff;
    }
    /* 💡 메인 콘텐츠와 충돌 없이 배경에만 깔리는 실시간 랜덤 노이즈 레이어 */
#noise{

position:fixed;

inset:0;

z-index:-1;

opacity:.10;

image-rendering:

pixelated;

filter:

contrast(180%);

}
</style>
</head>
<body>
<canvas id="noise"></canvas>
    <!-- 1. 바깥쪽 반투명 박스 시작 -->
    <div class="main-wrapper">
    
        <!-- 포스터 이미지 -->
        <img src="https://cdn.deconreconstruction.com/vasterror/panels/00001.gif" class="poster-img" alt="Vast Error">

        <!-- 3줄 하단 메뉴 목록 -->
        <div class="footer-menu">
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">위키</a> ] | [ <a href="#">모험 지도</a> ] | [ <a href="#">크레딧</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">패트리온</a> ] | [ <a href="#">스토어</a> ] | [ <a href="#">밴드캠프</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">디스코드</a> ] | [ <a href="#">텀블러</a> ] | [ <a href="#">트위터</a> ]
            </div>
        </div>

        <!-- 2. 회색 박스 형태의 메뉴들 (예시) -->
        <div class="gray-box">전문</div>
        <div class="gray-box">콘텐츠 경고</div>

        <!-- > 시작하다 링크 -->
        <a href="#" class="start-link">&gt; 시작하다.</a>

    </div>
    <!-- 바깥쪽 반투명 박스 끝 -->

<script>

const canvas=
document.getElementById(
"noise"
);

const ctx=
canvas.getContext(
"2d"
);

function resize(){

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

drawNoise();

}

function drawNoise(){

const img=
ctx.createImageData(
canvas.width,
canvas.height
);

const data=
img.data;

for(
let i=0;
i<data.length;
i+=4
){

const v=
Math.random()>0.5
?
255
:
0;

data[i]=v;
data[i+1]=v;
data[i+2]=v;
data[i+3]=255;

}

ctx.putImageData(
img,
0,
0
);

}

window.addEventListener(
"resize",
resize
);

resize();

</script>
</body>
</html>

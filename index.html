<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vast Error 비공식 번역</title>
    <style>
        body {

margin:0;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("./assets/bg.jpg");

background-size:cover;

background-position:center;

background-attachment:fixed;

color:#fff;

font-family:
"Courier New",
monospace;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

overflow-x:hidden;

padding:40px 0;

}

    .main-wrapper {

width:760px;

padding:
24px
40px
50px;

background:
rgba(
15,
15,
15,
0.92
);

border:
1px solid #555;

box-shadow:

0 0 0 2px #222,

0 0 40px rgba(
0,
0,
0,
.9
);

backdrop-filter:
blur(2px);

animation:
fadeIn .8s;

}

    .poster-img {

width:100%;

display:block;

margin-bottom:25px;

border:

1px solid #666;

transition:.35s;

filter:

brightness(.95);

}

.poster-img:hover{

transform:
scale(1.01);

filter:
brightness(1.08);

}

    .start-link {

display:block;

text-align:center;

font-size:30px;

color:#66ff66;

margin-top:30px;

text-decoration:none;

transition:.25s;

}

.start-link:hover{

letter-spacing:2px;

text-shadow:

0 0 15px #00ff00;

}

    .footer-menu {

display:grid;

gap:10px;

margin:25px 0;

}

.footer-menu a{

color:white;

padding:4px 10px;

text-decoration:none;

transition:.2s;

}

.footer-menu a:hover{

background:#444;

box-shadow:
0 0 8px rgba(
255,
255,
255,
.3
);

}
 {
        text-decoration: underline;
    }

    .gray-box {

background:

linear-gradient(
#3a3a3a,
#262626
);

border:

1px solid #555;

padding:14px;

margin:10px 0;

cursor:pointer;

transition:.2s;

}

.gray-box:hover{

transform:
translateX(6px);

background:#444;

}
    /* 💡 메인 콘텐츠와 충돌 없이 배경에만 깔리는 실시간 랜덤 노이즈 레이어 */
#noise{
position:fixed;
inset:0;

z-index:-1;

opacity:.22;

/* screen 삭제 */
mix-blend-mode:normal;

image-rendering:pixelated;

filter:
contrast(250%)
brightness(120%);

pointer-events:none;
}
@keyframes fadeIn{

from{

opacity:0;

transform:
translateY(20px);

}

to{

opacity:1;

transform:none;

}

}
</style>
</head>
<body class="fade">
<canvas id="noise"></canvas>
    <!-- 1. 바깥쪽 반투명 박스 시작 -->
    <div class="main-wrapper">
    
        <!-- 포스터 이미지 -->
        <img src="https://cdn.deconreconstruction.com/vasterror/panels/00001.gif" class="poster-img" alt="Vast Error">

        <!-- 3줄 하단 메뉴 목록 -->
        <div class="footer-menu">
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">위키</a> ] | [ <a href="#">모험 지도</a> ] | [ <a href="#">크레딧</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">패트리온</a> ] | [ <a href="#">스토어</a> ] | [ <a href="#">밴드캠프</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">디스코드</a> ] | [ <a href="#">텀블러</a> ] | [ <a href="#">트위터</a> ]
            </div>
        </div>

        <!-- 2. 회색 박스 형태의 메뉴들 (예시) -->
        <div class="gray-box">전문</div>
        <div class="gray-box">콘텐츠 경고</div>

        <!-- > 시작하다 링크 -->
        <a href="#" class="start-link">&gt; 시작하다.</a>

    </div>
    <!-- 바깥쪽 반투명 박스 끝 -->

<script>

const canvas=
document.getElementById(
"noise"
);

const ctx=
canvas.getContext(
"2d"
);

function resize(){

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

}

window.addEventListener(
"resize",
resize
);

resize();

function drawNoise(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

for(
let i=0;
i<6000;
i++
){

ctx.fillStyle=
Math.random()>.8
?
"#fff"
:
"#000";

ctx.fillRect(

Math.random()*canvas.width,

Math.random()*canvas.height,

2,

2

);

}

requestAnimationFrame(
drawNoise
);

}

drawNoise();

</script>
</body>
</html>

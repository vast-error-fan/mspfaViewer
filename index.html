<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vast Error 비공식 번역</title>
    <style>
        body{

margin:0;

background:
linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.75)
),
url("./assets/bg.jpg");

background-size:cover;

background-position:center;

background-attachment:fixed;

color:#fff;

font-family:
"Courier New",
monospace;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

overflow-x:hidden;

padding:40px 0;

}

    /* 💡 원작 스타일: 전체를 감싸는 커다란 반투명 검은색 박스 */
    .main-wrapper{

background:

rgba(
0,
0,
0,
0.50
);

padding:

20px;

width:760px;

box-sizing:border-box;

display:flex;

flex-direction:column;

align-items:center;

}

    .poster-img {
        max-width: 650px;
        width: 100%;
        height: auto;
        border: 2px solid #444444;
        display: block;
        margin: 0 auto 25px auto;
    }

    .start-link{

display:block;

width:650px;

text-align:center;

margin-top:18px;

color:white;

font-size:24px;

text-decoration:none;

}
    .start-link:hover {
        color: #ffffff;
        text-shadow: 0 0 15px #ffffff;
    }

    .footer-menu{

width:650px;

background:#eeeeee;

padding:12px;

margin:15px 0;

box-sizing:border-box;

text-align:center;

}

.footer-menu a{

color:#000;

text-decoration:none;

}

.footer-menu a:hover{

text-decoration:underline;

}

    /* 💡 원작 스타일: 하단 버튼들을 감싸는 실선 회색 박스 */
    .gray-box{

width:650px;

background:#eeeeee;

color:#000;

padding:14px;

margin:8px 0;

box-sizing:border-box;

text-align:center;

cursor:pointer;

}

.gray-box:hover{

background:#e5e5e5;

}
    /* 💡 메인 콘텐츠와 충돌 없이 배경에만 깔리는 실시간 랜덤 노이즈 레이어 */
#noise{

position:fixed;

inset:0;

z-index:-1;

opacity:.05;

filter:none;

mix-blend-mode:normal;

}
</style>
</head>
<body>
<canvas id="noise"></canvas>
    <!-- 1. 바깥쪽 반투명 박스 시작 -->
    <div class="main-wrapper">
    
        <!-- 포스터 이미지 -->
        <img src="https://cdn.deconreconstruction.com/vasterror/panels/00001.gif" class="poster-img" alt="Vast Error">

        <!-- 3줄 하단 메뉴 목록 -->
        <div class="footer-menu">
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">위키</a> ] | [ <a href="#">모험 지도</a> ] | [ <a href="#">크레딧</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">패트리온</a> ] | [ <a href="#">스토어</a> ] | [ <a href="#">밴드캠프</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">디스코드</a> ] | [ <a href="#">텀블러</a> ] | [ <a href="#">트위터</a> ]
            </div>
        </div>

        <!-- 2. 회색 박스 형태의 메뉴들 (예시) -->
        <div class="gray-box">전문</div>
        <div class="gray-box">콘텐츠 경고</div>

        <!-- > 시작하다 링크 -->
        <a href="#" class="start-link">&gt; 시작하다.</a>

    </div>
    <!-- 바깥쪽 반투명 박스 끝 -->

<script>

const canvas=
document.getElementById(
"noise"
);

const ctx=
canvas.getContext(
"2d"
);

function resize(){

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

drawNoise();

}

function drawNoise(){

const img=
ctx.createImageData(
canvas.width,
canvas.height
);

const data=
img.data;

for(
let i=0;
i<data.length;
i+=4
){

const v=
Math.random()>0.5
?
255
:
0;

data[i]=v;
data[i+1]=v;
data[i+2]=v;
data[i+3]=255;

}

ctx.putImageData(
img,
0,
0
);

}

window.addEventListener(
"resize",
resize
);

resize();

</script>
</body>
</html>

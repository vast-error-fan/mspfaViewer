<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Vast Error 비공식 번역</title>
    <style>
        body {
    background-color: #1a1a1a; /* 기본 어두운 배경 */
    
    /* 💡 보안 시스템을 우회하여 내부에 심은 필터를 불러오는 치트키 */
    
    color: #ffffff;
    font-family: "Courier New", Courier, monospace;
    margin: 0;
    padding: 40px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

    /* 💡 원작 스타일: 전체를 감싸는 커다란 반투명 검은색 박스 */
    .main-wrapper {
        background-color: rgba(20, 20, 20, 0.85); /* 반투명한 검은색 */
        border: 4px double #444444; /* 클래식한 이중 테두리 */
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        padding: 40px;
        max-width: 750px;
        width: 100%;
        box-sizing: border-box;
    }

    .poster-img {
        max-width: 650px;
        width: 100%;
        height: auto;
        border: 2px solid #444444;
        display: block;
        margin: 0 auto 25px auto;
    }

    .start-link {
        display: inline-block;
        font-size: 24px;
        font-weight: bold;
        color: #00ff00;
        text-decoration: none;
        text-shadow: 0 0 10px rgba(0,255,0,0.5);
        margin: 25px auto;
        width: 100%;
        text-align: center;
    }
    .start-link:hover {
        color: #ffffff;
        text-shadow: 0 0 15px #ffffff;
    }

    .footer-menu {
        font-size: 14px;
        color: #aaaaaa;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        margin: 25px auto;
    }
    .footer-menu a {
        color: #ffffff;
        text-decoration: none;
        margin: 0 5px;
    }
    .footer-menu a:hover {
        text-decoration: underline;
    }

    /* 💡 원작 스타일: 하단 버튼들을 감싸는 실선 회색 박스 */
    .gray-box {
        background-color: #2e2e2e; /* 어두운 회색 */
        border: 1px solid #555555; /* 얇은 회색 테두리 */
        padding: 12px;
        margin: 15px auto;
        max-width: 650px;
        width: 100%;
        color: #dddddd;
        font-size: 14px;
        text-align: center;
        box-sizing: border-box;
        cursor: pointer;
    }
    .gray-box:hover {
        background-color: #383838;
        color: #ffffff;
    }
    /* 💡 메인 콘텐츠와 충돌 없이 배경에만 깔리는 실시간 랜덤 노이즈 레이어 */
#noise{
position:fixed;
inset:0;

width:100%;
height:100%;

z-index:0;

pointer-events:none;

opacity:.18;

mix-blend-mode:overlay;

image-rendering:auto;
}

.main-wrapper{
position:relative;
z-index:1;

background:
rgba(20,20,20,.88);
}
</style>
</head>
<body>
<canvas id="noise"></canvas>
    <!-- 1. 바깥쪽 반투명 박스 시작 -->
    <div class="main-wrapper">
    
        <!-- 포스터 이미지 -->
        <img src="https://cdn.deconreconstruction.com/vasterror/panels/00001.gif" class="poster-img" alt="Vast Error">

        <!-- 3줄 하단 메뉴 목록 -->
        <div class="footer-menu">
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">위키</a> ] | [ <a href="#">모험 지도</a> ] | [ <a href="#">크레딧</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">패트리온</a> ] | [ <a href="#">스토어</a> ] | [ <a href="#">밴드캠프</a> ]
            </div>
            <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                [ <a href="#">디스코드</a> ] | [ <a href="#">텀블러</a> ] | [ <a href="#">트위터</a> ]
            </div>
        </div>

        <!-- 2. 회색 박스 형태의 메뉴들 (예시) -->
        <div class="gray-box">전문</div>
        <div class="gray-box">콘텐츠 경고</div>

        <!-- > 시작하다 링크 -->
        <a href="#" class="start-link">&gt; 시작하다.</a>

    </div>
    <!-- 바깥쪽 반투명 박스 끝 -->
<script>
const canvas =
document.getElementById("noise");

const ctx =
canvas.getContext("2d");

function renderNoise(){

canvas.width=
window.innerWidth;

canvas.height=
window.innerHeight;

const img=
ctx.createImageData(
canvas.width,
canvas.height
);

const data=img.data;

for(
let i=0;
i<data.length;
i+=4
){

const white =
Math.random() > 0.82;

// 검정도 조금 보이게
const v =
white ? 255 : 0;

data[i]=v;
data[i+1]=v;
data[i+2]=v;

// 투명도 올림
data[i+3]=
white
?60
:18;
}

ctx.putImageData(
img,
0,
0
);

}

renderNoise();

window.addEventListener(
"resize",
renderNoise
);
</script>
</body>
</html>

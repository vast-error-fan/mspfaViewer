<script>

const canvas =
document.getElementById("noise");

const ctx =
canvas.getContext("2d");

function drawNoise(){

    const img =
    ctx.createImageData(
        canvas.width,
        canvas.height
    );

    const data = img.data;

    for(let i=0;i<data.length;i+=4){

        const v =
        Math.random() > 0.5
        ? 255
        : 0;

        data[i]   = v;
        data[i+1] = v;
        data[i+2] = v;
        data[i+3] = 255;
    }

    ctx.putImageData(
        img,
        0,
        0
    );
}

function resize(){

    canvas.width =
    window.innerWidth;

    canvas.height =
    window.innerHeight;

    drawNoise();
}

window.addEventListener(
    "resize",
    resize
);

resize();

</script>
